version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    platform: linux/amd64
    image: postgres:16-alpine
    container_name: team-mgmt-db
    environment:
      POSTGRES_DB: team_management
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d team_management" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - team-mgmt-network

  # Backend Resource Service
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/resource-service/Dockerfile
    container_name: team-mgmt-backend
    environment:
      NODE_ENV: production
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: team_management
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      SMTP_ENCRYPTION_KEY: ${SMTP_ENCRYPTION_KEY:-8df85ca54199c193387c6fa242c755601dff8954769062a4d3397f7422321111}
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - team-mgmt-network
    restart: unless-stopped

  # Frontend Web Application
  frontend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: team-mgmt-frontend
    environment:
      VITE_API_BASE: http://localhost:4001
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - team-mgmt-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  team-mgmt-network:
    driver: bridge
